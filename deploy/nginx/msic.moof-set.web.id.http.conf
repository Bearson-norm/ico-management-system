# Tahap 1 — hanya HTTP (untuk uji + Certbot pertama kali).
# Salin ke /etc/nginx/sites-available/msic lalu: sudo ln -sf ... sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx
# Setelah sertifikat ada, ganti ke msic.moof-set.web.id.conf (HTTPS) atau biarkan Certbot yang mengubah file ini.

upstream next_msic {
    server 127.0.0.1:1325;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name msic.moof-set.web.id;

    client_max_body_size 20m;

    location / {
        proxy_pass http://next_msic;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
