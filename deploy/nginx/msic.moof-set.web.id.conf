# Tahap 2 — produksi: redirect HTTP → HTTPS + TLS (Let's Encrypt).
# Prasyarat: DNS A msic.moof-set.web.id → IP VPS; PM2/Next mendengarkan 127.0.0.1:1325;
# sertifikat sudah ada di /etc/letsencrypt/live/msic.moof-set.web.id/ (jalankan certbot dulu, lihat README).

upstream next_msic {
    server 127.0.0.1:1325;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name msic.moof-set.web.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name msic.moof-set.web.id;

    ssl_certificate     /etc/letsencrypt/live/msic.moof-set.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msic.moof-set.web.id/privkey.pem;

    # Jika ada setelah certbot install plugin nginx:
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    location / {
        proxy_pass http://next_msic;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
